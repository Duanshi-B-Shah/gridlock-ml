version: 1.0
runtime: python3
build:
  commands:
    build:
      - pip install -r requirements.txt
  env:
    - name: STREAMLIT_SERVER_PORT
      value: "8080"
    - name: STREAMLIT_SERVER_ADDRESS
      value: "0.0.0.0"
    - name: STREAMLIT_SERVER_HEADLESS
      value: "true"
run:
  command: streamlit run app/streamlit_app.py --server.port 8080 --server.address 0.0.0.0 --server.headless true
  network:
    port: 8080
  env:
    - name: PYTHONPATH
      value: "src"
